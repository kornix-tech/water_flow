services:
  soilflow-web:
    image: soilflow-pflotran:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UBUNTU_VERSION: "24.04"
        PETSC_VERSION: "v3.24.5"
        PETSC_ARCH: "linux-gnu-c-opt"
        PFLOTRAN_GIT_REF: "master"
        PFLOTRAN_REPO: "https://bitbucket.org/pflotran/pflotran"
        BUILD_JOBS: "${BUILD_JOBS:-4}"
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - soilflow_workspace:/workspace
    environment:
      SOILFLOW_WORKSPACE: /workspace
      PORT: 8080
      JOB_WORKERS: ${JOB_WORKERS:-1}
      SOILFLOW_AUTH_MODE: ${SOILFLOW_AUTH_MODE:-none}
      SOILFLOW_API_TOKEN: ${SOILFLOW_API_TOKEN:-}
      SOILFLOW_MAX_ARCHIVE_MB: ${SOILFLOW_MAX_ARCHIVE_MB:-2048}
      SOILFLOW_MAX_ARCHIVE_FILES: ${SOILFLOW_MAX_ARCHIVE_FILES:-20000}
      SOILFLOW_JOB_TIMEOUT_SECONDS: ${SOILFLOW_JOB_TIMEOUT_SECONDS:-21600}
      SOILFLOW_API_RATE_LIMIT_PER_MINUTE: ${SOILFLOW_API_RATE_LIMIT_PER_MINUTE:-120}
      SOILFLOW_MAX_JSON_BODY_KB: ${SOILFLOW_MAX_JSON_BODY_KB:-512}
      SOILFLOW_ENABLE_API_DOCS: ${SOILFLOW_ENABLE_API_DOCS:-false}
      SOILFLOW_ENABLE_HSTS: ${SOILFLOW_ENABLE_HSTS:-false}
    restart: unless-stopped

volumes:
  soilflow_workspace:
